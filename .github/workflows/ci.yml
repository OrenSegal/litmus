name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests (offline, no deps)
        run: python -m unittest discover -s tests -t .
      - name: Dogfood — gate the example suite against its baseline
        run: python -m litmus.cli gate examples/signal-scout --baseline examples/signal-scout/baseline.json
